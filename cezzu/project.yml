name: Cezzu
options:
  bundleIdPrefix: com.bent2685.cezzu
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
  generateEmptyDirectories: true
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"

# 全局 build 设置
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO  # 让 sync_seed_rules.sh 能读 ../cezzu-rule/

# SwiftPM 包依赖：本地 CezzuKit
packages:
  CezzuKit:
    path: CezzuKit

# ============================================================
# Targets
# ============================================================
targets:

  # ---------- iOS App ----------
  Cezzu-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Cezzu-iOS/Sources
    info:
      path: Cezzu-iOS/Info.plist
      properties:
        CFBundleDisplayName: Cezzu
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSExceptionDomains:
            127.0.0.1:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bent2685.cezzu.iOS
        CODE_SIGN_ENTITLEMENTS: Cezzu-iOS/Cezzu_iOS.entitlements
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: CezzuKit
        product: CezzuKit
    preBuildScripts:
      - name: Sync seed rules from cezzu-rule/
        script: |
          "${SRCROOT}/scripts/sync_seed_rules.sh"
        basedOnDependencyAnalysis: false
        runOnlyWhenInstalling: false

  # ---------- macOS App ----------
  Cezzu-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Cezzu-macOS/Sources
    info:
      path: Cezzu-macOS/Info.plist
      properties:
        CFBundleDisplayName: Cezzu
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "© 2026 bent2685. MIT License."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSExceptionDomains:
            127.0.0.1:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bent2685.cezzu.macOS
        CODE_SIGN_ENTITLEMENTS: Cezzu-macOS/Cezzu_macOS.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: CezzuKit
        product: CezzuKit
    preBuildScripts:
      - name: Sync seed rules from cezzu-rule/
        script: |
          "${SRCROOT}/scripts/sync_seed_rules.sh"
        basedOnDependencyAnalysis: false
        runOnlyWhenInstalling: false

# Schemes —— 默认就让两个 App target 各自有一个 scheme
schemes:
  Cezzu-iOS:
    build:
      targets:
        Cezzu-iOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

  Cezzu-macOS:
    build:
      targets:
        Cezzu-macOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
