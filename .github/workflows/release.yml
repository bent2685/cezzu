name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0-rc.1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: macos-26
    env:
      DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
      DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Validate tag and version
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import sys

          tag = os.environ["RELEASE_TAG"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?", tag):
              print(f"error: invalid release tag: {tag}", file=sys.stderr)
              sys.exit(1)

          release_version = tag[1:].split("-", 1)[0]
          with open("version.json", encoding="utf-8") as file:
              version = json.load(file)

          ios_version = version["ios"]["version"]
          macos_version = version["macos"]["version"]
          if ios_version != release_version or macos_version != release_version:
              print(
                  "error: version.json must match tag base version "
                  f"{release_version}; got iOS={ios_version}, macOS={macos_version}",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(f"Release tag {tag} matches app version {release_version}")
          PY

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Write CI secrets xcconfig
        run: |
          : "${DANDANPLAY_APP_ID:?Set GitHub secret DANDANPLAY_APP_ID}"
          : "${DANDANPLAY_APP_SECRET:?Set GitHub secret DANDANPLAY_APP_SECRET}"

          {
            echo "// Generated by GitHub Actions; do not commit."
            printf 'DANDANPLAY_APP_ID = %s\n' "$DANDANPLAY_APP_ID"
            printf 'DANDANPLAY_APP_SECRET = %s\n' "$DANDANPLAY_APP_SECRET"
          } > cezzu/LocalSecrets.xcconfig

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcodegen --version

      - name: Test CezzuKit
        working-directory: cezzu/CezzuKit
        run: swift test

      - name: Build macOS DMGs
        run: ./scripts/release_macos.sh

      - name: Build unsigned iOS IPA
        run: ./scripts/release_ios.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cezzu-${{ env.RELEASE_TAG }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        run: |
          notes_file=".github/release-notes/${RELEASE_TAG}.md"
          args=(
            "$RELEASE_TAG"
            dist/*
            --title "$RELEASE_TAG"
            --verify-tag
          )

          if [[ -f "$notes_file" ]]; then
            args+=(--notes-file "$notes_file")
          else
            args+=(--generate-notes)
          fi

          if [[ "$RELEASE_TAG" == *"-"* ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
